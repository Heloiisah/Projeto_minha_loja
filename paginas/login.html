    <link rel="stylesheet" href="../css/style_formulario.css">
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

         
    <div id="logo">
        <h1>HELOISA</h1>
        <h2>Personalizados</h2>
        <p>Criando presentes únicos</p>
    </div>
    
            <nav id="menu">
                <ul>

                    <li>
                        <a href="../index.html">
                            <img src="../imagens/icones/inicio.png" alt="Início" title="Início">
                        </a>
                    </li>

                    <li>
                        <a href="sobre.html">
                            <img src="../imagens/icones/sobre.png" alt="Sobre" title="Sobre">

                    <li>
                        <a href="login.html">
                            <img src="../imagens/icones/login.png" alt="Login" title="Login">

                    <li>

                        </a>
                    </li>

                </ul>
            </nav>

        </header>

        <section id="form">

            <h3>Login</h3>

            <form id="frm-pessoa">

                <label for="email">E-mail</label>
                <input
                    class="input001"
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required>

                <label for="senha">Senha</label>
                <input
                    class="input001"
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required>

                <label>
                    <input type="checkbox" id="lembrar">
                    Lembrar meu acesso
                </label>

                <input
                    type="submit"
                    value="Entrar"
                    class="btnCadastrar">

                <input
                    type="reset"
                    value="Limpar"
                    class="btnLimpar">

            </form>

        </section>

        <footer id="rodape">
            <h2>&copy; Heloisa Personalizados</h2>
            <p>Formas de pagamento: Pix, Cartão de Débito e Crédito.</p>
        </footer>

    </main>

</body>

</html>
